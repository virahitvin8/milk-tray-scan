<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quan Scan — AI Quantity Counting App</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              500: '#00c2a8',
              600: '#00a389',
              700: '#0f766e',
              950: '#123a34',
            },
            accent: {
              50: '#fff5f2',
              100: '#ffe7df',
              500: '#ff7a59',
              600: '#ea580c',
            },
            violetAccent: {
              50: '#f5f3ff',
              100: '#edeaff',
              500: '#8c7cff',
              600: '#7c3aed',
            },
            surface: {
              50: '#f3fbf8',
              100: '#ffffff',
              200: '#e2f5f0',
              800: '#1e293b',
              900: '#0f172a',
            }
          },
          animation: {
            'scan-line': 'scan 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            scan: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(100%)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <!-- Import Map for ES Modules -->
    <style>
    /* Hide scrollbar for clean UI but allow scrolling */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-brand-50 text-brand-950 antialiased selection:bg-brand-500 selection:text-white overflow-x-hidden font-sans">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
